name: sync-artifacts-example

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Prepare public data
        run: |
          echo "Example: npm run prepare:data -- ../marketdata_cpp/artifacts"
          npm run generate:examples
          npm run validate:artifacts
